apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventnet-backend
  labels:
    app: eventnet-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: eventnet-backend
  template:
    metadata:
      labels:
        app: eventnet-backend
    spec:
      containers:
        - name: backend
          image: eventnet/backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: eventnet-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eventnet-backend
spec:
  selector:
    app: eventnet-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eventnet-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eventnet-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventnet-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.eventnet.io
      secretName: eventnet-tls
  rules:
    - host: api.eventnet.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eventnet-backend
                port:
                  number: 5000
