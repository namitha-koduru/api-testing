<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h2>Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button onclick="login()">
            Login
        </button>

        <p id="message"></p>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
