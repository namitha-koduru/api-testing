{% extends "user/base.html" %}
{% block title %}Profile — EventNet{% endblock %}
{% block content %}
<div class="page-header">
  <h1>👤 My Profile</h1>
  <p class="page-subtitle">Manage your account settings</p>
</div>

<div class="profile-layout">
  <!-- Profile Info -->
  <div class="profile-card">
    <h2>Personal Information</h2>
    <form method="POST" action="{{ url_for('user.profile') }}">
      <input type="hidden" name="action" value="update_profile" />
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" class="form-control"
                 value="{{ current_user.first_name or '' }}" placeholder="John" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" class="form-control"
                 value="{{ current_user.last_name or '' }}" placeholder="Doe" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" value="{{ current_user.email }}" disabled />
        <small class="field-hint">Email cannot be changed</small>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="form-control" value="{{ current_user.username }}" disabled />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" class="form-control"
               value="{{ current_user.phone or '' }}" placeholder="+91 9876543210" />
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>

  <!-- Change Password -->
  <div class="profile-card">
    <h2>Change Password</h2>
    <form method="POST" action="{{ url_for('user.profile') }}">
      <input type="hidden" name="action" value="change_password" />
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="old_password" class="form-control" required />
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" class="form-control" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-outline">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
