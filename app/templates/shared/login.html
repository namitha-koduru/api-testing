<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EventNet</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared/css/auth.css') }}" />
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">EventNet</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-with-toggle">
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="eye-toggle" onclick="togglePassword('password')">👁</button>
          </div>
        </div>
        <div class="form-check">
          <input type="checkbox" id="remember" name="remember" />
          <label for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Sign In
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}">Create one</a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword(fieldId) {
      const f = document.getElementById(fieldId);
      f.type = f.type === 'password' ? 'text' : 'password';
    }
    document.getElementById('loginForm').addEventListener('submit', function() {
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
    });
  </script>
</body>
</html>
