<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Page Not Found</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;background:#f1f5f9;
         display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:#fff;border-radius:20px;padding:60px 48px;text-align:center;
          box-shadow:0 4px 40px rgba(0,0,0,.10);max-width:440px;width:100%;}
    .icon{font-size:72px;margin-bottom:16px;}
    h1{font-size:56px;font-weight:800;color:#6366f1;margin-bottom:8px;}
    h2{font-size:22px;font-weight:700;margin-bottom:10px;color:#1e293b;}
    p{color:#64748b;font-size:15px;margin-bottom:28px;}
    a{display:inline-flex;align-items:center;gap:6px;background:#6366f1;color:#fff;
      padding:11px 24px;border-radius:9px;text-decoration:none;font-weight:600;font-size:15px;}
    a:hover{background:#4f46e5;}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔍</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
