<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — EventNet</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared/css/auth.css') }}" />
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-card auth-card--wide">
      <div class="auth-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">EventNet</span>
      </div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Join EventNet to register for workshops & meetings</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" class="form-control"
                   placeholder="John" />
          </div>
          <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-control"
                   placeholder="Doe" />
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email address <span class="required">*</span></label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="username">Username <span class="required">*</span></label>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="johndoe" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" class="form-control"
                 placeholder="+91 9876543210" />
        </div>
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="input-with-toggle">
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Min. 6 characters" required />
            <button type="button" class="eye-toggle" onclick="togglePassword('password')">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password <span class="required">*</span></label>
          <div class="input-with-toggle">
            <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                   placeholder="Re-enter password" required />
            <button type="button" class="eye-toggle" onclick="togglePassword('confirm_password')">👁</button>
          </div>
          <p id="pwMatch" class="field-error" style="display:none">Passwords do not match</p>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
          Create Account
        </button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="{{ url_for('auth.login') }}">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword(fieldId) {
      const f = document.getElementById(fieldId);
      f.type = f.type === 'password' ? 'text' : 'password';
    }
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm_password').value;
      const msg = document.getElementById('pwMatch');
      if (p !== c) {
        e.preventDefault();
        msg.style.display = 'block';
        return;
      }
      msg.style.display = 'none';
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
    });
  </script>
</body>
</html>
