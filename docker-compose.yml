version: "3.9"

services:
  eventnet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventnet_app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # SQLite database persistence – survives container restarts
      - eventnet_db:/app/instance
      # Upload files persistence
      - eventnet_uploads:/app/uploads
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-set-a-strong-secret-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret-in-production}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/instance/eventnet.db}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@eventnet.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@1234}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  eventnet_db:
    driver: local
  eventnet_uploads:
    driver: local
