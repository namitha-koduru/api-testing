version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventnet
      POSTGRES_PASSWORD: eventnet
      POSTGRES_DB: eventnet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://eventnet:eventnet@postgres:5432/eventnet
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
      JWT_SECRET_KEY: jwt-dev-secret
      CORS_ORIGINS: http://localhost:5173,http://localhost:80
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    command: >
      sh -c "flask db upgrade 2>/dev/null || flask db init && flask db migrate -m 'init' && flask db upgrade;
             python seed.py && gunicorn --worker-class eventlet -w 1 -b 0.0.0.0:5000 'run:app'"

  celery:
    build: ./backend
    command: celery -A app.extensions.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://eventnet:eventnet@postgres:5432/eventnet
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
